services:
  - type: web
    name: flash-shop
    env: node
    region: frankfurt
    plan: free
    buildCommand: cd frontend && npm install --include=dev && npm run build && cd .. && node scripts/copy-dist.js
    startCommand: cd backend && npm install --omit=dev && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: FRONTEND_URL
        value: https://flash-shop.onrender.com
